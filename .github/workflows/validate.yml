name: Validate boards

on:
  pull_request:
    paths:
      - "boards/**/*.json"
      - "notes/**/*.md"
      - "schema.json"
      - "vendors.json"
      - "README.md"
      - "scripts/update-readme.py"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "boards/**/*.json"
      - "notes/**/*.md"
      - "schema.json"
      - "vendors.json"
      - "README.md"
      - "scripts/update-readme.py"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema referencing

      - name: Validate boards against schema
        run: |
          python - <<'PY'
          import json, glob, sys
          from jsonschema import Draft202012Validator
          from referencing import Registry, Resource

          with open("schema.json") as f:
              schema = json.load(f)
          # Register the whole schema under a URN so internal $refs (e.g.
          # #/$defs/price from the board sub-schema) resolve against it.
          registry = Registry().with_resource("urn:root", Resource.from_contents(schema))
          validator = Draft202012Validator({"$ref": "urn:root#/$defs/board"}, registry=registry)

          errors = 0
          files = sorted(glob.glob("boards/**/*.json", recursive=True))
          for path in files:
              with open(path) as f:
                  board = json.load(f)
              for e in validator.iter_errors(board):
                  print(f"::error file={path}::{e.json_path}: {e.message}")
                  errors += 1

          print(f"{len(files)} boards checked, {errors} error(s)")
          sys.exit(1 if errors else 0)
          PY

      - name: Check README.md vendor tables are in sync with vendors.json
        run: |
          python scripts/update-readme.py
          if ! git diff --exit-code README.md; then
            echo "::error file=README.md::README.md is out of sync with vendors.json. Run 'python scripts/update-readme.py' locally and commit the change."
            exit 1
          fi

      - name: Check notes/ files match an existing board
        run: |
          python - <<'PY'
          import glob, os, sys

          orphans = []
          for path in sorted(glob.glob("notes/**/*.md", recursive=True)):
              # notes/<vendor>/<mpn>.md must have a matching boards/<vendor>/<mpn>.json.
              # Skip top-level files (e.g. notes/README.md) — only files nested
              # one folder deep are treated as board notes.
              rel_parts = os.path.relpath(path, "notes").split(os.sep)
              if len(rel_parts) != 2:
                  continue
              vendor, filename = rel_parts
              board_path = os.path.join("boards", vendor, os.path.splitext(filename)[0] + ".json")
              if not os.path.isfile(board_path):
                  orphans.append((path, board_path))

          for note, expected in orphans:
              print(f"::error file={note}::Orphaned note: no matching board file at {expected}")
          if orphans:
              sys.exit(1)
          print(f"All notes have matching board files.")
          PY

      - name: Check for duplicate MPNs
        run: |
          python - <<'PY'
          import json, glob, sys
          from collections import Counter

          mpns = []
          for path in sorted(glob.glob("boards/**/*.json", recursive=True)):
              with open(path) as f:
                  board = json.load(f)
              mpn = board.get("mpn")
              if mpn:
                  mpns.append((mpn, path))

          counts = Counter(m for m, _ in mpns)
          dupes = [m for m, c in counts.items() if c > 1]
          if dupes:
              for mpn in dupes:
                  paths = [p for m, p in mpns if m == mpn]
                  for p in paths:
                      print(f"::error file={p}::Duplicate MPN: {mpn}")
              sys.exit(1)
          print(f"{len(mpns)} MPNs, no duplicates")
          PY
