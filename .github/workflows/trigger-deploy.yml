name: Trigger site rebuild

on:
  push:
    branches: [main]
    paths:
      - "boards/**/*.json"
      - "vendors.json"
      - "vendors/**"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build
        run: curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
